<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="100%" stop-color="#18181b" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#bg)" />

  <!-- Decorative chart line in background -->
  <polyline
    points="600,320 680,260 740,290 840,200 940,140 1060,80 1180,30"
    fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="2"
    stroke-linecap="round" stroke-linejoin="round"
  />
  <polyline
    points="600,340 700,300 780,315 880,260 980,220 1100,170 1200,130"
    fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1.5"
    stroke-linecap="round" stroke-linejoin="round"
  />

  <!-- Logo mark -->
  <g transform="translate(80, 130)">
    <rect width="140" height="140" rx="26" fill="#000000" />
    <polyline points="21,105 39,84 53,93 75,57 101,28" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
    <polyline points="86,28 101,28 101,43" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Brand name -->
  <text
    x="260"
    y="232"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="96"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="-3"
  >DeepStock</text>

  <!-- Subtitle -->
  <text
    x="263"
    y="292"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="30"
    font-weight="400"
    fill="#52525b"
    letter-spacing="0.5"
  >Investing, deeply.</text>
</svg>

<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- App Identity -->
    <title>DeepStock</title>
    <meta name="description" content="Portfolio tracker a analýza investic" />
    <meta name="theme-color" content="#ffffff" />
    
    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DeepStock" />
    
    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/deepstock.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var key = 'deepstock-theme';
        var theme = 'light';

        try {
          var stored = window.localStorage.getItem(key);
          if (stored === 'light' || stored === 'dark') {
            theme = stored;
          }
        } catch {}

        var root = document.documentElement;
        root.classList.toggle('dark', theme === 'dark');
        root.dataset.theme = theme;
        root.style.colorScheme = theme;

        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) {
          meta.setAttribute('content', theme === 'dark' ? '#232323' : '#ffffff');
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
